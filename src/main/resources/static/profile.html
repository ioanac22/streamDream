<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My StreamDream Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <style>
    /* --- MODERN GLOW & GLASSMORPHISM CSS --- */
    body {
        background: radial-gradient(circle at 10% 20%, rgb(36, 0, 70) 0%, rgb(16, 0, 43) 90%);
        min-height: 100vh;
        color: #fff;
        overflow-x: hidden;
    }

    /* Lumini Ambientale (Background Blobs) */
    .ambient-light {
        position: absolute;
        width: 300px;
        height: 300px;
        background: #7b2cbf;
        filter: blur(150px);
        opacity: 0.4;
        z-index: -1;
        border-radius: 50%;
        animation: float 10s infinite ease-in-out;
    }
    .light-1 { top: 10%; left: 20%; background: #9d4edd; }
    .light-2 { bottom: 10%; right: 10%; background: #3c096c; }

    @keyframes float {
        0% { transform: translate(0, 0); }
        50% { transform: translate(20px, 40px); }
        100% { transform: translate(0, 0); }
    }

    /* Container Principal - Glass Effect */
    .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    /* Avatar Styling */
    .avatar-container {
        position: relative;
        width: 160px;
        height: 160px;
        margin: 0 auto;
    }
    .avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid rgba(224, 170, 255, 0.3);
        transition: border-color 0.3s, transform 0.3s;
    }
    .avatar-container:hover .avatar-img {
        border-color: #e0aaff;
        transform: scale(1.02);
    }
    .edit-badge {
        position: absolute;
        bottom: 5px;
        right: 5px;
        background: #e0aaff;
        color: #240046;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        cursor: pointer;
        transition: transform 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .edit-badge:hover { transform: scale(1.1) rotate(10deg); }

    /* Typography & Name Edit */
    .user-name {
        background: linear-gradient(90deg, #e0aaff, #c77dff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    /* Bio Section */
    .bio-box {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
    }
    .bio-text {
        color: #e0aaff;
        line-height: 1.6;
        font-size: 1.05rem;
        white-space: pre-line;
    }
    .btn-edit-bio {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255,255,255,0.1);
        border: none;
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        transition: background 0.2s;
    }
    .btn-edit-bio:hover { background: rgba(255,255,255,0.2); }

    /* Inputs */
    .modern-input {
        background: rgba(0,0,0,0.3);
        border: 1px solid #5a189a;
        color: white;
        border-radius: 12px;
        padding: 15px;
        width: 100%;
        resize: none;
        outline: none;
    }
    .modern-input:focus {
        border-color: #9d4edd;
        box-shadow: 0 0 15px rgba(157, 78, 221, 0.2);
    }

    /* Stats Cards */
    .stat-card {
        background: rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 15px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.05);
        transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
    .stat-number { font-size: 1.5rem; font-weight: bold; color: #fff; }
    .stat-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

    /* Danger Zone */
    .danger-zone {
        margin-top: 30px;
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 20px;
    }
    .btn-delete-acc {
        background: transparent;
        border: 1px solid #ff4d6d;
        color: #ff4d6d;
        border-radius: 8px;
        padding: 8px 20px;
        font-size: 0.9rem;
        transition: all 0.3s;
    }
    .btn-delete-acc:hover {
        background: #ff4d6d;
        color: white;
        box-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
    }
</style>
</head>
<body>

<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<nav class="navbar navbar-expand-lg navbar-dark py-3 custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold fst-italic" href="index.html">💜 StreamDream</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto" id="dynamic-menu"></div>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="glass-panel p-0">
        <div class="row g-0">

            <div class="col-lg-4 p-5 text-center border-end border-white-10" style="background: rgba(0,0,0,0.2);">

                <div class="avatar-container mb-4">
                    <img id="profile-avatar" src="https://via.placeholder.com/150" class="avatar-img shadow-lg" alt="Profile">
                    <div class="edit-badge" onclick="document.getElementById('avatarInput').click()" title="Change Photo">
                        📷
                    </div>
                    <input type="file" id="avatarInput" style="display: none;" accept="image/*" onchange="uploadAvatar()">
                </div>

                <div class="mb-1 position-relative d-inline-block">
                    <h2 class="user-name d-inline-block" id="profile-username">Loading...</h2>
                    <span onclick="toggleNameEdit(true)" style="cursor: pointer; font-size: 1rem; color: #aaa; vertical-align: middle; margin-left: 5px;">✏️</span>

                    <div id="usernameEditMode" class="position-absolute top-50 start-50 translate-middle bg-dark p-3 rounded-4 shadow-lg"
                         style="display: none; width: 250px; border: 1px solid #e0aaff; z-index: 100;">
                        <input type="text" id="usernameInput" class="form-control form-control-sm mb-2 text-center bg-secondary text-white border-0">
                        <div class="d-flex justify-content-center gap-2">
                            <button onclick="toggleNameEdit(false)" class="btn btn-sm btn-outline-light rounded-pill px-2">❌</button>
                            <button onclick="saveUsername()" class="btn btn-sm btn-success rounded-pill px-2">💾 Save</button>
                        </div>
                    </div>
                </div>

                <p class="text-white-50 mb-4" id="profile-email">...</p>

                <div class="d-flex justify-content-center gap-3 mt-4">
                    <div class="stat-card w-100">
                        <div class="stat-number">👑</div>
                        <div class="stat-label">Member</div>
                    </div>
                    <div class="stat-card w-100">
                        <div class="stat-number">⭐</div>
                        <div class="stat-label">Active</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8 p-5">
                <h4 class="fw-bold mb-4 text-white">About Me</h4>

                <div id="bioViewMode" class="bio-box mb-4">
                    <button class="btn-edit-bio" onclick="toggleBioEdit(true)">✏️ Edit</button>
                    <p id="bioText" class="bio-text mb-0">
                        You haven't written a bio yet. <br>
                        <span class="text-white-50 small">Click edit to tell the world what you watch!</span>
                    </p>
                </div>

                <div id="bioEditMode" class="bio-box mb-4" style="display: none; border-color: #9d4edd;">
                    <textarea id="bioInput" class="modern-input" rows="5" placeholder="Write something epic about yourself..."></textarea>
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <button onclick="toggleBioEdit(false)" class="btn btn-outline-light btn-sm rounded-pill px-3">Cancel</button>
                        <button onclick="saveBio()" class="btn btn-primary btn-sm rounded-pill px-4" style="background: #7b2cbf; border: none;">Save Changes</button>
                    </div>
                </div>

                <div class="danger-zone d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-white fw-bold mb-1">Account Settings</h6>
                        <small class="text-white-50">Manage your access and data.</small>
                    </div>
                    <button onclick="deleteAccount()" class="btn-delete-acc">Delete Account</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script>
    // --- 1. LOAD USER DATA ---
    document.addEventListener('DOMContentLoaded', () => {
        const storedUser = localStorage.getItem('user');
        if (!storedUser) { window.location.href = 'login.html'; return; }
        const user = JSON.parse(storedUser);

        // Populate Profile
        document.getElementById('profile-username').innerText = user.username;
        document.getElementById('profile-email').innerText = user.email;
        if(user.avatarUrl) document.getElementById('profile-avatar').src = user.avatarUrl;

        // Populate Bio
        if(user.bio && user.bio.trim() !== "") {
            document.getElementById('bioText').innerText = user.bio;
            document.getElementById('bioInput').value = user.bio;
        }

        // Build Navbar
        const nav = document.getElementById('dynamic-menu');
        const userAvatar = user.avatarUrl
                ? `<img src="${user.avatarUrl}" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #e0aaff;">`
                : '👤';
        nav.innerHTML = `
            <a class="nav-link" href="index.html">Catalog</a>
            <a class="nav-link" href="watchlist.html">Watchlist</a>
            <a class="nav-link" href="history.html">History</a>
            <a href="profile.html" class="nav-link text-white ms-2 d-flex align-items-center gap-2 active fw-bold">${userAvatar} <span>${user.username}</span></a>
            <button onclick="logout()" class="btn btn-sm btn-outline-light ms-3 rounded-pill">Log Out</button>
        `;
    });

    // --- 2. AVATAR UPLOAD ---
    async function uploadAvatar() {
    const fileInput = document.getElementById('avatarInput'); // Asigură-te că input-ul are id="avatarInput"
    const file = fileInput.files[0];

    if (!file) return Swal.fire('Oops', 'Please select a file first!', 'warning');

    // 1. Convertim Poza în Base64 (String)
    const reader = new FileReader();
    reader.readAsDataURL(file);

    reader.onload = async function () {
        const base64String = reader.result; // Aici e poza transformată în text

        // 2. Trimitem la Backend
        try {
            const user = JSON.parse(localStorage.getItem('user'));

            const res = await fetch('http://localhost:8080/api/users/update-photo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: user.userId, // sau user.id, verifică cum e salvat
                    avatarUrl: base64String
                })
            });

            if (res.ok) {
                const updatedUser = await res.json();
                localStorage.setItem('user', JSON.stringify(updatedUser)); // Actualizăm userul în browser
                Swal.fire('Success', 'Profile picture updated!', 'success').then(() => location.reload());
            } else {
                const txt = await res.text();
                Swal.fire('Error', txt, 'error');
            }
        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Upload failed', 'error');
        }
    };

    reader.onerror = function (error) {
        console.log('Error: ', error);
    };
}

    // --- 3. BIO EDIT LOGIC ---
    function toggleBioEdit(show) {
        if(show) {
            document.getElementById('bioViewMode').style.display = 'none';
            document.getElementById('bioEditMode').style.display = 'block';
            document.getElementById('bioInput').focus();
        } else {
            document.getElementById('bioViewMode').style.display = 'block';
            document.getElementById('bioEditMode').style.display = 'none';
            // Reset input value to stored bio
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('bioInput').value = user.bio || "";
        }
    }

    async function saveBio() {
        const bioText = document.getElementById('bioInput').value;
        const user = JSON.parse(localStorage.getItem('user'));

        try {
            const res = await fetch('http://localhost:8080/api/users/update-bio', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.userId || user.id, bio: bioText })
            });
            if (res.ok) {
                const updatedUser = await res.json();
                localStorage.setItem('user', JSON.stringify(updatedUser));
                document.getElementById('bioText').innerText = updatedUser.bio || "No bio yet.";
                toggleBioEdit(false);
                Swal.fire({icon: 'success', title: 'Bio Updated!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, background: '#240046', color:'#fff'});
            }
        } catch (e) { console.error(e); }
    }

    // --- 4. USERNAME EDIT LOGIC ---
    function toggleNameEdit(show) {
        const editMode = document.getElementById('usernameEditMode');
        const currentName = document.getElementById('profile-username').innerText;
        if (show) {
            editMode.style.display = 'block';
            const input = document.getElementById('usernameInput');
            input.value = currentName;
            input.focus();
        } else {
            editMode.style.display = 'none';
        }
    }

    async function saveUsername() {
        const newName = document.getElementById('usernameInput').value;
        const user = JSON.parse(localStorage.getItem('user'));

        if (!newName || newName.trim().length < 3) {
            Swal.fire('Too short', 'Username needs at least 3 characters.', 'warning');
            return;
        }

        try {
            const res = await fetch('http://localhost:8080/api/users/update-username', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.userId || user.id, newUsername: newName })
            });

            if (res.ok) {
                const updatedUser = await res.json();
                localStorage.setItem('user', JSON.stringify(updatedUser));
                document.getElementById('profile-username').innerText = updatedUser.username;
                toggleNameEdit(false);
                Swal.fire({icon: 'success', title: 'Renamed!', text: `Hello, ${updatedUser.username}!`, toast: true, position: 'top', showConfirmButton: false, timer: 2000, background: '#240046', color: '#fff'});
            } else {
                const msg = await res.text();
                Swal.fire('Oops', msg, 'error');
            }
        } catch (e) { console.error(e); }
    }

    // --- 5. DELETE ACCOUNT ---
    async function deleteAccount() {
        if(await Swal.fire({
            title: 'Delete Account?',
            text: "This action cannot be undone.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d6d',
            confirmButtonText: 'Yes, Delete',
            background: '#10002b', color: '#fff'
        }).then(r => r.isConfirmed)){
            const user = JSON.parse(localStorage.getItem('user'));
            await fetch(`http://localhost:8080/api/users/delete/${user.userId || user.id}`, {method:'DELETE'});
            logout();
        }
    }

    function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
</script>
</body>
</html>
