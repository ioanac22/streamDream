<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDream - Watchlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4 py-3 shadow-sm custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold fst-italic" href="index.html">💜 StreamDream</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto" id="dynamic-menu"></div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-white fw-bold mb-4">📺 My Watchlist</h2>
    <div id="watchlist-container" class="row pb-5"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script>
    // --- 1. NAVBAR LOGIC (CU POZĂ) ---
    document.addEventListener('DOMContentLoaded', () => {
        const storedUser = localStorage.getItem('user');
        const navContainer = document.getElementById('dynamic-menu');

        if (storedUser) {
            const user = JSON.parse(storedUser);

            // Verificăm dacă are poză
            const userAvatar = user.avatarUrl
                ? `<img src="${user.avatarUrl}" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #e0aaff;">`
                : '👤';

            const adminLink = user.role === 'admin' ? `<a href="admin.html" class="btn btn-sm btn-danger ms-3 rounded-pill">🛡️ Admin</a>` : '';

            navContainer.innerHTML = `
                <a class="nav-link" href="index.html">Catalog</a>
                <a class="nav-link active fw-bold" href="watchlist.html">Watchlist</a>
                <a class="nav-link" href="history.html">History</a>
                <a href="profile.html" class="nav-link text-white ms-2 d-flex align-items-center gap-2">${userAvatar} <span>${user.username}</span></a>
                ${adminLink}
                <button onclick="logout()" class="btn btn-sm btn-outline-light ms-3 rounded-pill">Log Out</button>
            `;
            loadWatchlist(user.userId || user.id);
        } else {
            window.location.href = 'login.html';
        }
    });

    // --- 2. LOAD WATCHLIST (Restul scriptului rămâne la fel) ---
    async function loadWatchlist(userId) {
        try {
            const res = await fetch(`http://localhost:8080/api/watchlist/user/${userId}`);
            const list = await res.json();
            const container = document.getElementById('watchlist-container');

            if(list.length === 0) {
                container.innerHTML = `<div class="col-12 text-center text-white-50 mt-5"><h4>Your watchlist is empty. Go add some movies! 🎬</h4></div>`;
                return;
            }

            container.innerHTML = list.map(item => {
                const m = item.media;
                return `
                <div class="col-md-3 mb-4">
                    <div class="card h-100 card-dreamy">
                        <img src="${m.posterUrl}" class="card-img-top" style="height:350px; object-fit:cover;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="fw-bold text-truncate">${m.title}</h5>
                            <div class="mb-3">
                                <span class="badge bg-purple">${m.genre}</span>
                                <small class="text-white-50 ms-2">${m.releaseYear}</small>
                            </div>
                            <div class="mt-auto d-grid gap-2">
                                <a href="reviews.html?mediaId=${m.mediaId}&title=${encodeURIComponent(m.title)}&poster=${encodeURIComponent(m.posterUrl)}"
                                   class="btn btn-sm btn-outline-light rounded-pill">⭐ Review It</a>
                                <button onclick="removeFromWatchlist(${item.watchlistId})" class="btn btn-sm btn-danger rounded-pill">❌ Remove</button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        } catch(e) { console.error(e); }
    }

    async function removeFromWatchlist(id) {
        await fetch(`http://localhost:8080/api/watchlist/remove/${id}`, {method:'DELETE'});
        location.reload();
    }

    function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
</script>
</body>
</html>
