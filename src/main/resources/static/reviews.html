<!DOCTYPE html>
<html lang="en">
<head>
    <title>Write a Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDream</title>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
</head>
<body>
<div class="stars"></div>
<div class="card card-dreamy p-4 rounded-4" style="width: 100%; max-width: 500px;">
    <div class="text-center mb-4">
        <img id="moviePoster" src="" style="width: 120px; height: 180px; object-fit: cover; border-radius: 10px; border: 2px solid #9d4edd;">
        <h3 id="movieTitle" class="mt-3 fw-bold text-white">Loading...</h3>
        <p class="text-white-50">Rate this title</p>
    </div>

    <form onsubmit="submitReview(event)">
        <input type="hidden" id="mediaId">

        <div class="mb-3">
            <label class="fw-bold mb-1 text-white">Rating</label>
            <select id="rating" class="form-select bg-dark text-white border-secondary">
                <option value="10">⭐10 - Masterpiece</option>
                <option value="9">⭐9 - Amazing</option>
                <option value="8" selected>⭐8 - Very Good</option>
                <option value="7">⭐7 - Good</option>
                <option value="5">⭐5 - Average</option>
                <option value="1">⭐1 - Terrible</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="fw-bold mb-1 text-white">Review</label>
            <textarea id="comment" class="form-control bg-dark text-white border-secondary" rows="3" placeholder="Write what impressed you..."></textarea>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-check-movie py-2 rounded-pill">Save & Mark as Watched</button>
            <a href="watchlist.html" class="btn btn-outline-light py-2 rounded-pill">Cancel</a>
        </div>
    </form>
</div>

<script>
    // 1. Verificăm dacă userul e logat
    const storedUser = localStorage.getItem('user');
    if (!storedUser) {
        alert("Please login first!");
        window.location.href = 'login.html';
    }
    const currentUser = JSON.parse(storedUser);
    // Luăm ID-ul corect, indiferent cum e salvat (userId sau id)
    const REAL_USER_ID = currentUser.userId || currentUser.id;

    // 2. Preluăm datele filmului din URL
    const urlParams = new URLSearchParams(window.location.search);
    const mediaId = urlParams.get('mediaId'); // Parametrul din URL

    // Umplem pagina cu detalii (Titlu, Poster)
    if(mediaId) {
        document.getElementById('mediaId').value = mediaId;
        document.getElementById('movieTitle').innerText = urlParams.get('title') || "Unknown Title";
        document.getElementById('moviePoster').src = urlParams.get('poster') || "";
    } else {
        alert("No movie selected!");
        window.location.href = "watchlist.html";
    }

    // 3. Funcția de trimitere (Fixată)
    async function submitReview(e) {
        e.preventDefault(); // Oprește reîncărcarea paginii

        const rating = document.getElementById('rating').value;
        const comment = document.getElementById('comment').value;

        // FOLOSIM FORMDATA (Exact ca în Postman!)
        const formData = new FormData();
        formData.append('userId', REAL_USER_ID); // <--- AICI ERA PROBLEMA (ID REAL)
        formData.append('mediaId', mediaId);
        formData.append('rating', rating);
        formData.append('comment', comment);

        try {
            // Nu mai punem parametri in URL (?userId=...), îi punem în BODY
            const res = await fetch('http://localhost:8080/api/reviews/add', {
                method: 'POST',
                body: formData // Trimitem datele ca formular
            });

            if(res.ok) {
                await Swal.fire({
                    title: 'StreamDream Reviewed! ✨',
                    text: 'Your review has been saved to history.',
                    icon: 'success',
                    background: '#240046',
                    color: '#e0aaff',
                    confirmButtonColor: '#7b2cbf',
                    confirmButtonText: 'Awesome!',
                    timer: 2000,
                    timerProgressBar: true
                });
                // Redirecționare către History
                window.location.href = "history.html";
            } else {
                const errorText = await res.text();
                console.error("Server Error:", errorText);
                alert("Error saving review: " + errorText);
            }
        } catch (err) {
            console.error(err);
            alert("Connection error. Check console.");
        }
    }
</script>
</body>
</html>
