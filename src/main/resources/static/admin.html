<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamDream - Command Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Stiluri specifice Admin - suprascriu style.css unde e nevoie */
        .navbar-admin {
            background: linear-gradient(90deg, #6a040f, #9d0208, #d00000);
            border-bottom: 2px solid #ff0000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .btn-magic {
            background: linear-gradient(45deg, #ff9e00, #ff0000);
            color: white; border: none; font-weight: bold;
        }
        .btn-magic:hover { color: white; box-shadow: 0 0 15px #ff9e00; }

        .btn-add-db {
            background: linear-gradient(45deg, #06d6a0, #118ab2);
            border: none; color: white; font-weight: bold;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #5a189a;
            border-radius: 10px;
        }

        .admin-table thead th {
            background-color: rgba(0,0,0,0.3);
            border-bottom: 2px solid #5a189a;
            color: white;
        }
        .admin-table tbody td {
            color: #e0aaff;
            vertical-align: middle;
        }
        /* --- FIX TABELE (SCOATE ALBUL) --- */
    .table, .table tbody, .table td, .table th, .table tr {
        background-color: transparent !important;  /* Face fundalul transparent */
        color: #e0aaff !important;                 /* Scris lila deschis */
        border-color: #5a189a !important;          /* Liniile dintre rânduri */
    }

    /* Efect la mouse over pe rând */
    .table tbody tr:hover {
        background-color: rgba(224, 170, 255, 0.1) !important; /* O lumină fină la hover */
    }

    /* Asigură-te că input-urile sau link-urile din tabel nu rămân negre */
    .table a, .table span {
        color: white !important;
    }
        /* --- FIX AUTOFILL INPUTS (DARK MODE) --- */

    /* Input-urile normale */
    .form-control {
        background-color: rgba(16, 0, 43, 0.6) !important; /* Fundal mov foarte închis/transparent */
        border: 1px solid #5a189a !important;              /* Contur mov */
        color: #e0aaff !important;                         /* Text lila deschis */
    }

    /* Când dai click în ele (Focus) */
    .form-control:focus {
        background-color: rgba(36, 0, 70, 0.9) !important; /* Puțin mai deschis la focus */
        border-color: #9d4edd !important;                  /* Contur neon */
        box-shadow: 0 0 15px rgba(157, 78, 221, 0.4) !important; /* Strălucire */
        color: white !important;
    }

    /* Textul ajutător (Placeholder - ex: "Type title...") */
    .form-control::placeholder {
        color: rgba(224, 170, 255, 0.4) !important;        /* Lila șters */
        font-style: italic;
    }
    </style>
</head>
<body>
<div class="stars"></div>
<nav class="navbar navbar-expand-lg navbar-dark navbar-admin mb-4 py-3">

    <div class="container">
        <span class="navbar-brand fw-bold fs-4">🛡️ COMMAND CENTER</span>
        <div class="d-flex align-items-center">
            <span class="text-white-50 me-3 small text-uppercase d-none d-md-block">Admin: <strong class="text-white">BOSS</strong></span>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill me-2">Go to Site</a>
            <button onclick="logout()" class="btn btn-dark btn-sm rounded-pill">Log Out</button>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <div class="row mb-4 text-center">
        <div class="col-md-4 mb-2">
            <div class="p-3 stat-box">
                <h2 class="fw-bold mb-0 text-white" id="count-movies">0</h2>
                <small class="text-white-50 text-uppercase">Total Movies</small>
            </div>
        </div>
        <div class="col-md-4 mb-2">
            <div class="p-3 stat-box">
                <h2 class="fw-bold mb-0 text-white" id="count-users">0</h2>
                <small class="text-white-50 text-uppercase">Total Users</small>
            </div>
        </div>
        <div class="col-md-4 mb-2">
            <div class="p-3 stat-box">
                <h2 class="fw-bold mb-0 text-white" id="count-watchlist">0</h2>
                <small class="text-white-50 text-uppercase">Active reservations</small>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card card-dreamy h-100">
                <div class="card-header text-center py-3 border-secondary"><span class="fs-5 text-white">🎬 Add Content</span></div>
                <div class="card-body">
                    <form onsubmit="return false;">
                        <div class="mb-3">
                            <label class="small text-white-50 fw-bold mb-1">TITLE</label>
                            <div class="input-group">
                                <input type="text" id="apiTitle" class="form-control" required placeholder="Type title...">
                                <button type="button" class="btn btn-magic" onclick="autofill()">AUTOFILL</button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small text-white-50 fw-bold mb-1">GENRE</label>
                            <input type="text" id="apiGenre" class="form-control" required placeholder="Auto-filled...">
                        </div>
                        <div class="mb-3">
                            <label class="small text-white-50 fw-bold mb-1">RELEASE YEAR</label>
                            <input type="number" id="apiYear" class="form-control" required value="2000">
                        </div>
                        <div class="mb-4">
                            <label class="small text-white-50 fw-bold mb-1">POSTER URL</label>
                            <input type="text" id="apiPoster" class="form-control" required placeholder="Auto-filled...">
                            <img id="previewImg" src="" style="display:none; width: 100%; margin-top: 10px; border-radius: 5px; border: 1px solid #5a189a;">
                        </div>
                        <button id="actionBtn" class="btn btn-success w-100 fw-bold" onclick="handleFormSubmit()">Add to database</button>                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">

            <div class="card card-dreamy shadow-sm mb-4">
                <div class="card-header bg-transparent py-3 border-secondary"><span class="fs-5 text-white">👥 User Database</span></div>
                <div class="card-body p-0">
                    <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                        <table class="table admin-table table-hover mb-0">
                            <thead>
                            <tr>
                                <th class="ps-4">User</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                            </thead>
                            <tbody id="user-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card card-dreamy shadow-sm">
                <div class="card-header bg-transparent py-3 border-secondary"><span class="fs-5 text-white">🎥 Content Library</span></div>
                <div class="card-body p-0" style="max-height: 300px; overflow-y: auto;">
                    <table class="table admin-table table-hover mb-0">
                        <tbody id="library-table-body">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script src="admin.js?v=2"></script>
<script>
    function logout() {
        // Placeholder pentru logout (vom face logica data viitoare)
        window.location.href = "login.html"; // Sau index.html momentan
    }
</script>
</body>
<script>
    // 1. Verificăm cine e logat
    const storedUser = localStorage.getItem('user');
    const currentUser = storedUser ? JSON.parse(storedUser) : null;

    // 2. Regula de Aur: Dacă nu ești logat SAU nu ești admin -> Afară!
    if (!currentUser || currentUser.role !== 'admin') {
        alert("⛔ ACCESS DENIED: Admins only!");
        window.location.href = 'index.html'; // Îl trimitem la catalog
    }
</script>
</html>
